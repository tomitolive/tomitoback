name: 🔄 Fallback AI Updater (3 pages / 15min)

on:
  schedule:
    - cron: "*/15 * * * *"   # كايخدم كل 15 دقيقة
  workflow_dispatch:           # تشغيل يدوي إذا حبيتي

jobs:
  update-fallback:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests google-auth pytrends

      - name: Run Fallback Updater (3 Pages)
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
          GCP_INDEXING_KEY: ${{ secrets.GCP_INDEXING_KEY }}
        run: |
          python3 fallback_updater.py

      - name: Check if queue is empty
        id: check_queue
        run: |
          REMAINING=$(python3 -c "
          import json, os
          f = 'fallback_pages.json'
          if os.path.exists(f):
              data = json.load(open(f))
              print(len(data))
          else:
              print(0)
          ")
          echo "remaining=$REMAINING" >> $GITHUB_OUTPUT
          echo "📊 Remaining in queue: $REMAINING"

      - name: Commit and Push Changes
        run: |
          git config --local user.email "bot@tomito.xyz"
          git config --local user.name "Fallback Updater Bot"
          git add .
          git commit -m "🔄 Fallback Update: +3 AI pages | Queue: ${{ steps.check_queue.outputs.remaining }} left $(date '+%Y-%m-%d %H:%M') [skip ci]" || echo "No changes to commit"
          for i in {1..3}; do
            git pull --rebase --autostash origin main && git push origin main && break || \
            (echo "Retrying push..." && git rebase --abort || true && sleep 15)
          done

      - name: Disable workflow if queue is empty
        if: steps.check_queue.outputs.remaining == '0'
        run: |
          echo "✅ All fallback pages have been updated! Queue is empty."
          echo "You can manually disable this workflow from GitHub Actions now."
