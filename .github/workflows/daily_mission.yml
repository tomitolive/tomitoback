name: Daily Multi-Bot & SEO Mission (100 Pages/Day)

on:
  schedule:
    - cron: "*/30 * * * *"  # كايخدم كل نص ساعة
  workflow_dispatch:      # كيخليك تطلقو بيدك إذا بغيتي تجرب

jobs:
  daily-mission:
    runs-on: ubuntu-latest
    # تعديل 1: نقصنا التايم آوت باش نحميو الدقائق ديالك
    timeout-minutes: 10 
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests google-auth pytrends

      - name: Run Bot Mission (2 Pages)
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY_2 }}
          GCP_INDEXING_KEY: ${{ secrets.GCP_INDEXING_KEY }}
        run: |
          python3 daily_content.py --count 2

      - name: Update Trending Data
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: python3 update_trending.py

      - name: Build Homepage & Sitemaps
        run: |
          python3 build_homepage.py
          python3 generate_search_index.py
          python3 generate_full_sitemap.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "bot@tomito.xyz"
          git config --local user.name "Multi-Bot Engine"
          git add data/ movie/ tv/ genre/ sitemap*.xml t/
          
          # Commit with skip ci
          git commit -m "🤖 Bot: +2 pages $(date '+%Y-%m-%d %H:%M') [skip ci]" || echo "No changes to commit"
          
          # Better Push Logic: Try rebase, if fails, abort and force a merge pull or retry
          for i in {1..3}; do
            git pull --rebase --autostash origin main && git push origin main && break || \
            (echo "Conflict or concurrent push detected, retrying after sleep..." && git rebase --abort || true && sleep 20)
          done
